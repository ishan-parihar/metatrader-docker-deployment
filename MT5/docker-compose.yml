# MT5 Terminal with noVNC — Production Deployment
services:
  mt5:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mt5-terminal
    restart: unless-stopped
    ports:
      - "${MT5_NOVNC_PORT:-6080}:6080"
      - "${MT5_VNC_PORT:-5900}:5900"
    volumes:
      - mt5-config:/config
      - ./mql5:/opt/mt5/ea
      - ./config:/opt/mt5/config
    environment:
      - MT5_BROKER_LOGIN=${MT5_BROKER_LOGIN:-}
      - MT5_BROKER_PASSWORD=${MT5_BROKER_PASSWORD:-}
      - MT5_BROKER_SERVER=${MT5_BROKER_SERVER:-MetaQuotes-Demo}
      - MT5_ENABLE_NOVNC=${MT5_ENABLE_NOVNC:-1}
      - MT5_ENABLE_VNC=${MT5_ENABLE_VNC:-0}
      - MT5_NOVNC_PORT=${MT5_NOVNC_PORT:-6080}
      - MT5_VNC_PORT=${MT5_VNC_PORT:-5900}
      - MT5_MAX_BARS=${MT5_MAX_BARS:-5000}   # chart-bars RAM cap (biggest MT5 memory knob)
      - TZ=${TZ:-UTC}
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "pgrep", "-f", "terminal64.exe"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 750M
        reservations:
          memory: 400M

volumes:
  mt5-config:
