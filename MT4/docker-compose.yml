version: "3.8"

services:
  mt4-terminal:
    build: .
    container_name: mt4-terminal
    restart: unless-stopped
    ports:
      - "6081:6080"   # noVNC web interface (different port from MT5)
      - "5901:5900"   # VNC (optional)
    volumes:
      - ./config:/config
      - ../mql4mt5/MQL4:/opt/mt4/ea
      - ../mql4mt5/config:/opt/mt4/config
    env_file:
      - .env
    environment:
      - MT4_BROKER_LOGIN=${MT4_BROKER_LOGIN:-}
      - MT4_BROKER_PASSWORD=${MT4_BROKER_PASSWORD:-}
      - MT4_BROKER_SERVER=${MT4_BROKER_SERVER:-MetaQuotes-Demo}
      - MT4_ENABLE_NOVNC=1
      - MT4_NOVNC_PORT=6080
      - MT4_VNC_PORT=5900
    healthcheck:
      test: ["CMD", "pgrep", "-f", "terminal.exe"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
