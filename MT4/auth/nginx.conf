worker_processes auto;
error_log /usr/local/openresty/nginx/logs/error.log warn;
pid /usr/local/openresty/nginx/logs/nginx.pid;

events {
    worker_connections 1024;
}

http {
    large_client_header_buffers 4 16k;
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    lua_shared_dict login_rate 1m;
    lua_shared_dict sessions 1m;

    server {
        listen 8080;
        server_name _;

        location = / {
            default_type text/html;
            content_by_lua_block {
                local f = io.open("/usr/local/openresty/nginx/html/login.html", "r")
                if f then
                    ngx.say(f:read("*a"))
                    f:close()
                else
                    ngx.status = 500
                    ngx.say("login.html not found")
                end
            }
        }

        location = /auth {
            content_by_lua_block {
                local cjson = require "cjson"

                ngx.req.read_body()
                local body = ngx.req.get_body_data()
                if not body then
                    ngx.status = 400
                    ngx.say('{"error":"no body"}')
                    return
                end

                local ok, params = pcall(cjson.decode, body)
                if not ok or type(params) ~= "table" then
                    ngx.status = 400
                    ngx.say('{"error":"invalid json"}')
                    return
                end

                local username = params.username or ""
                local password = params.password or ""

                local rate = ngx.shared.login_rate
                local ip = ngx.var.remote_addr
                local key = "login:" .. ip
                local attempts = rate:get(key)

                if attempts and attempts >= 10 then
                    ngx.status = 429
                    ngx.say('{"error":"Too many attempts. Wait 60 seconds."}')
                    return
                end

                -- Read credentials from files written by entrypoint
                local function read_file(path)
                    local f = io.open(path, "r")
                    if not f then return nil end
                    local val = f:read("*a"):gsub("%s+", "")
                    f:close()
                    return #val > 0 and val or nil
                end
                local valid_user = read_file("/tmp/auth_user") or "admin"
                local valid_pass = read_file("/tmp/auth_pass") or "changeme"

                if username == valid_user and password == valid_pass then
                    rate:delete(key)

                    local f = io.open("/dev/urandom", "rb")
                    local token = ""
                    for i = 1, 32 do
                        token = token .. string.format("%02x", f:read(1):byte())
                    end
                    f:close()

                    local sessions = ngx.shared.sessions
                    sessions:set("sess:" .. token, username, 86400)

                    ngx.header["Set-Cookie"] = "mt4_session=" .. token .. "; Path=/; HttpOnly; SameSite=Strict; Max-Age=86400"
                    ngx.status = 200
                    ngx.say('{"status":"ok","redirect":"/vnc.html"}')
                else
                    rate:incr(key, 1, 0, 60)
                    ngx.status = 401
                    ngx.say('{"error":"Invalid credentials"}')
                end
            }
        }

        location = /logout {
            content_by_lua_block {
                local cookie = ngx.var.cookie_mt4_session
                if cookie then
                    ngx.shared.sessions:delete("sess:" .. cookie)
                end
                ngx.header["Set-Cookie"] = "mt4_session=; Path=/; HttpOnly; Max-Age=0"
                ngx.redirect("/")
            }
        }

        location / {
            access_by_lua_block {
                local cookie = ngx.var.cookie_mt4_session
                if not cookie then
                    ngx.redirect("/")
                    return
                end
                local user = ngx.shared.sessions:get("sess:" .. cookie)
                if not user then
                    ngx.header["Set-Cookie"] = "mt4_session=; Path=/; HttpOnly; Max-Age=0"
                    ngx.redirect("/")
                    return
                end
            }

            proxy_pass http://host.docker.internal:6081;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }
    }
}
